name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'release/**'
  workflow_dispatch:
    inputs:
      ref:
        description: 要构建的分支或 tag（例如 v0.1.0）
        required: false
        default: main
      create_release:
        description: 是否创建 GitHub Release（分支构建可仅上传 Artifact）
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download ktctl / kubectl
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 15
          command: pnpm fetch-binaries darwin-arm64 darwin-amd64

      - name: Build privileged helper
        env:
          KTVE_HELPER_TARGETS: mac
        run: bash native/privileged-helper/build.sh

      - name: Build workspace packages
        run: pnpm build

      - name: Pack macOS arm64
        run: pnpm --filter @kt-virtual-env/desktop pack:mac:arm64

      - name: Pack macOS x64
        run: pnpm --filter @kt-virtual-env/desktop pack:mac:x64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            dist/packages/*.dmg
            dist/packages/*.zip
            dist/packages/*.yml
            dist/packages/*.blockmap
            !dist/packages/*-unpacked/**
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download ktctl / kubectl
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_wait_seconds: 15
          timeout_minutes: 15
          command: pnpm fetch-binaries windows-amd64

      - name: Verify bundled Windows binaries
        run: |
          ./resources/bin/windows-amd64/ktctl.exe --version
          ./resources/bin/windows-amd64/kubectl.exe version --client
          test -f ./resources/bin/windows-amd64/wintun.dll

      - name: Build privileged helper
        env:
          KTVE_HELPER_TARGETS: win
        run: bash native/privileged-helper/build.sh

      - name: Build workspace packages
        run: pnpm build

      - name: Pack Windows
        run: pnpm --filter @kt-virtual-env/desktop pack:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/packages/*.exe
            dist/packages/*.yml
            dist/packages/*.blockmap
            !dist/packages/*-unpacked/**
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release)
    steps:
      - name: Resolve release tag
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.ref }}" == v* ]]; then
            echo "tag=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-installers
          path: dist/release/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: dist/release/windows

      - name: Generate checksums
        run: |
          mkdir -p dist/release/assets
          find dist/release/macos dist/release/windows -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.zip' -o -name '*.yml' -o -name '*.blockmap' \) -exec cp {} dist/release/assets/ \;
          cd dist/release/assets
          shasum -a 256 *.dmg *.exe *.zip 2>/dev/null > SHA256SUMS.txt || true
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: |
            dist/release/assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}
