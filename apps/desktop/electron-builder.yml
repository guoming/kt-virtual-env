appId: com.kt.virtualenv
productName: kt-virtual-env
copyright: Copyright © 2026
directories:
  output: ../../dist/packages
  buildResources: build
files:
  - out/**/*
  - package.json
artifactName: kt-virtual-env-${version}-${os}-${arch}.${ext}
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
  artifactName: kt-virtual-env-${version}-mac-${arch}.${ext}
  extendInfo:
    CFBundleDisplayName: Kubernetes 虚拟环境工作台
    CFBundleName: kt-virtual-env
dmg:
  title: kt-virtual-env ${version}
win:
  target:
    - nsis
  artifactName: kt-virtual-env-${version}-win-${arch}.${ext}
nsis:
  shortcutName: Kubernetes 虚拟环境工作台
  uninstallDisplayName: kt-virtual-env
  oneClick: false
  allowToChangeInstallationDirectory: true
